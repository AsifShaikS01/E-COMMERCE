<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sip & Chill</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <h1 class="logo">sip & chill</h1>
            <div class="form-group">
                <input type="text" id="username" placeholder="user name">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="password">
            </div>
            <div class="btn-group">
                <button class="btn btn-outline" id="btn-register">register</button>
                <button class="btn btn-primary" id="btn-login">login</button>
            </div>
        </div>

        <!-- Menu Screen -->
        <div id="menu-screen" class="screen">
            <div class="header">
                <div class="profile-icon"><i class="fas fa-user"></i></div>
                <h2>juicy-items</h2>
            </div>
            <div class="menu-list">
                <button class="menu-item" data-target="iceCreams">ice creams</button>
                <button class="menu-item" data-target="juice">juice</button>
                <button class="menu-item disabled">sp-juice</button>
                <button class="menu-item disabled">lassi items</button>
                <button class="menu-item disabled">falooda-s</button>
            </div>
        </div>

        <!-- Ice Creams Screen -->
        <div id="ice-creams-screen" class="screen">
            <div class="header">
                <button class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <h2>ICE - CREAMS</h2>
            </div>
            <div class="product-list">
                <div class="product-item">
                    <span>VANILLA ICE CREAM</span>
                    <button class="order-btn" data-item="Vanilla Ice Cream" data-price="40">ORDER 40/-</button>
                </div>
                <div class="product-item">
                    <span>CHOCOLATE ICE CREAM</span>
                    <button class="order-btn" data-item="Chocolate Ice Cream" data-price="40">ORDER 40/-</button>
                </div>
                <div class="product-item">
                    <span>STRAWBERRY ICE CREAM</span>
                    <button class="order-btn" data-item="Strawberry Ice Cream" data-price="40">ORDER 40/-</button>
                </div>
                <div class="product-item">
                    <span>PISTA ICE CREAM</span>
                    <button class="order-btn" data-item="Pista Ice Cream" data-price="50">ORDER 50/-</button>
                </div>
            </div>
        </div>

        <!-- Juice Screen -->
        <div id="juice-screen" class="screen">
            <div class="header">
                <button class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <h2>JUICE</h2>
            </div>
            <div class="product-list">
                <div class="product-item">
                    <span>BANANA JUICE</span>
                    <button class="order-btn" data-item="Banana Juice" data-price="40">ORDER 40/-</button>
                </div>
                <div class="product-item">
                    <span>PINE APPLE JUICE</span>
                    <button class="order-btn" data-item="Pine Apple Juice" data-price="40">ORDER 40/-</button>
                </div>
                <div class="product-item">
                    <span>WATER MELON JUICE</span>
                    <button class="order-btn" data-item="Water Melon Juice" data-price="40">ORDER 40/-</button>
                </div>
                <div class="product-item">
                    <span>GRAPES</span>
                    <button class="order-btn" data-item="Grapes" data-price="40">ORDER 40/-</button>
                </div>
            </div>
        </div>

        <!-- Order Screen -->
        <div id="order-screen" class="screen">
            <div class="header">
                <button class="back-btn" id="order-back-btn"><i class="fas fa-arrow-left"></i></button>
                <h2>ORDERS</h2>
            </div>
            <div class="order-summary" id="order-summary"></div>
            <div class="form-group">
                <input type="text" id="fullname" placeholder="FULL NAME">
            </div>
            <div class="form-group">
                <input type="text" id="mobile" placeholder="MOBILE NUMBER">
            </div>
            <div class="form-group">
                <textarea id="address" placeholder="ADRESS WITH PIN CODE" rows="4"></textarea>
            </div>
            <button class="btn btn-primary btn-block" id="btn-confirm-order">CONFORM/ORDER</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
